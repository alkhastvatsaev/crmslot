# Shell mobile (profil · sélecteur · panneau central · galaxy) — régressions fréquentes.
name: Mobile shell tests

on:
  pull_request:
    paths:
      - "src/features/dashboard/**"
      - "src/app/page.tsx"
      - "src/app/dashboard-mobile-layout.css"
      - "src/app/dashboard-layout.css"
      - "src/core/ui/dashboardMobileLayout.ts"
      - "package.json"
      - ".github/workflows/mobile-shell-tests.yml"

jobs:
  mobile-shell-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mobile shell contract tests
        run: npm run test:mobile-shell
