# Tests matériel + catalogue Lecot quand le module change.
name: Material tests

on:
  pull_request:
    paths:
      - "src/features/featureHub/**"
      - "src/features/catalog/**"
      - "src/app/api/catalog/**"
      - "src/app/api/ai/material-agent/**"
      - "jest.config.ts"
      - "jest.setup.ts"
      - ".github/workflows/material-tests.yml"

jobs:
  material-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run material + catalog unit tests
        run: npm run test:feature-hub
