name: Release pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Déployer sur Vercel (nécessite secrets VERCEL_*)"
        type: boolean
        default: false
      smoke_url:
        description: "URL pour smoke post-déploiement (ex. https://xxx.vercel.app)"
        type: string
        default: ""
  schedule:
  - cron: "0 7 * * 1"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
  NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder

jobs:
  quality:
    name: Lint, types, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run ci

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"

  deploy:
    name: Deploy Vercel (production)
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy == true &&
      secrets.VERCEL_TOKEN != ''
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        id: deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

  smoke-manual:
    name: Smoke URL (manuel)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'workflow_dispatch' && inputs.smoke_url != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/smoke-url.mjs "${{ inputs.smoke_url }}"

  smoke-scheduled:
    name: Smoke production (hebdo)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && secrets.PRODUCTION_URL != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/smoke-url.mjs "${{ secrets.PRODUCTION_URL }}"
