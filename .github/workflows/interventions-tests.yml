# Tests rapides interventions / facturation quand le module change.
name: Interventions tests

on:
  pull_request:
    paths:
      - "src/features/interventions/**"
      - "src/app/api/interventions/**"
      - "jest.config.ts"
      - "jest.setup.ts"
      - ".github/workflows/interventions-tests.yml"

jobs:
  interventions-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run interventions unit tests
        run: npm run test:interventions
