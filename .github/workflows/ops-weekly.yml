# Tâches opérationnelles hebdomadaires (vérifs catalogue + UIDs techniciens).
name: Ops weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lecot-image-verify:
    name: Lecot image index verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run fetch:lecot-images:verify
        continue-on-error: true

  technician-uids-check:
    name: Technician Auth UID drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run check:technician-uids
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
