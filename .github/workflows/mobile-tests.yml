# Mobile PWA — unit (contrats + infra + native) + E2E smoke shell.
name: Mobile tests

on:
  pull_request:
    paths:
      - "src/features/dashboard/**"
      - "src/features/mobile/**"
      - "src/core/native/**"
      - "src/core/config/mobileAccess.ts"
      - "src/core/config/mobileClientDetection.ts"
      - "src/core/config/mobileDevOrigins.ts"
      - "src/core/ui/dashboardMobileLayout.ts"
      - "src/core/ui/useIsMobile.ts"
      - "src/app/page.tsx"
      - "src/app/dashboard-mobile-layout.css"
      - "src/app/api/mobile/**"
      - "src/app/api/companies/*/pwa-registry/**"
      - "src/test-utils/renderMobileShell.tsx"
      - "src/test-utils/mobileGestures.ts"
      - "tests/e2e/mobile-shell.spec.ts"
      - "tests/e2e/helpers/mobileShell.ts"
      - "tests/e2e/api-mobile-config.spec.ts"
      - "tests/e2e/api-pwa-registry.spec.ts"
      - "playwright.config.ts"
      - "jest.config.ts"
      - "jest.setup.ts"
      - "package.json"
      - ".github/workflows/mobile-tests.yml"
  workflow_dispatch:

jobs:
  mobile-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mobile unit suite
        run: npm run test:mobile

  mobile-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile E2E smoke
        run: npm run test:e2e:mobile
        env:
          CI: "true"
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
