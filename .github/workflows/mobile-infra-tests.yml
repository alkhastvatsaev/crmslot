# Mobile infra (detection, config API, pwa-registry) when F-infra paths change.
name: Mobile infra tests

on:
  pull_request:
    paths:
      - "src/features/mobile/**"
      - "src/app/api/mobile/**"
      - "src/app/api/companies/*/pwa-registry/**"
      - "src/core/config/mobileAccess.ts"
      - "src/core/config/mobileClientDetection.ts"
      - "src/core/config/__tests__/mobileAccess.test.ts"
      - "src/core/config/__tests__/mobileClientDetection.test.ts"
      - "src/core/ui/useIsMobile.ts"
      - "src/core/ui/__tests__/useIsMobile.test.ts"
      - "tests/e2e/mobile-shell.spec.ts"
      - "tests/e2e/api-mobile-config.spec.ts"
      - "tests/e2e/api-pwa-registry.spec.ts"
      - "playwright.config.ts"
      - "jest.config.ts"
      - "jest.setup.ts"
      - ".github/workflows/mobile-infra-tests.yml"

jobs:
  mobile-infra-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run mobile infra unit tests
        run: npm run test:mobile-infra

  mobile-infra-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile API E2E smoke
        run: npx playwright test tests/e2e/api-mobile-config.spec.ts tests/e2e/api-pwa-registry.spec.ts --project=chromium
        env:
          CI: "true"
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
