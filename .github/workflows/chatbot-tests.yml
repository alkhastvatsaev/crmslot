# Exécution rapide des tests chatbot quand le module change (complète test.yml sur main).
name: Chatbot tests

on:
  pull_request:
    paths:
      - "src/features/chatbot/**"
      - "src/app/api/ai/chatbot/**"
      - "tests/contract/chatbot.contract.test.ts"
      - "src/core/api/schemas/chatbot.ts"
      - "src/features/chatbot/testFixtures/**"
      - "jest.config.ts"
      - "jest.setup.ts"
      - ".github/workflows/chatbot-tests.yml"

jobs:
  chatbot-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run chatbot unit tests
        run: npm run test:chatbot && npm run test:contract -- tests/contract/chatbot.contract.test.ts
