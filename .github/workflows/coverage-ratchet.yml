name: Coverage Ratchet

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout baseline (main)
        run: |
          mkdir -p /tmp/baseline
          git fetch origin main
          git show origin/main:coverage/baseline.json > /tmp/baseline/baseline.json 2>/dev/null || echo "{}" > /tmp/baseline/baseline.json

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Coverage
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:0"
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder
        run: npm run test:coverage

      - name: Restore baseline from main
        run: |
          mkdir -p coverage
          cp /tmp/baseline/baseline.json coverage/baseline.json

      - name: Ratchet check
        run: npm run coverage:ratchet
