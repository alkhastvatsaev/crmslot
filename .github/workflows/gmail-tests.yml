# Tests hub Gmail quand le module change.
name: Gmail tests

on:
  pull_request:
    paths:
      - "src/features/gmail/**"
      - "src/app/api/integrations/gmail/**"
      - "jest.config.ts"
      - "jest.setup.ts"
      - ".github/workflows/gmail-tests.yml"

jobs:
  gmail-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Gmail unit tests
        run: npm run test:gmail
